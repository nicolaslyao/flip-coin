<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#08111f" />
    <title>抛硬币和摇骰子</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-photo bg-photo-1" aria-hidden="true"></div>
    <div class="bg-photo bg-photo-2" aria-hidden="true"></div>
    <div class="backdrop backdrop-1" aria-hidden="true"></div>
    <div class="backdrop backdrop-2" aria-hidden="true"></div>

    <main class="app" id="app">
      <header class="card hero glass">
        <div class="hero-top">
          <div>
            <p class="eyebrow">Simple Lab</p>
            <h1>抛硬币 & 摇骰子</h1>
          </div>

          <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换明暗模式">
            <span class="theme-toggle-track">
              <span class="theme-toggle-thumb">
                <span class="theme-icon sun" aria-hidden="true"></span>
                <span class="theme-icon moon" aria-hidden="true"></span>
              </span>
            </span>
          </button>
        </div>
      </header>

      <section class="card glass chooser" id="chooserView">
        <div class="chooser-grid">
          <button class="choice-card coin-choice" id="chooseCoin" type="button" aria-label="进入抛硬币">
            <span class="choice-icon choice-coin" aria-hidden="true">
              <span class="choice-coin-inner"></span>
            </span>
            <strong>抛硬币</strong>
          </button>

          <button class="choice-card dice-choice" id="chooseDice" type="button" aria-label="进入摇骰子">
            <span class="choice-icon choice-dice" aria-hidden="true">
              <span class="choice-dice-inner"></span>
            </span>
            <strong>摇骰子</strong>
          </button>
        </div>
      </section>

      <section class="card feature glass detail-view" id="coinView" hidden>
        <div class="feature-head">
          <h2>抛硬币</h2>
          <button class="ghost-btn" id="backFromCoin" type="button">返回</button>
        </div>

        <div class="stage coin-stage">
          <div class="coin-wrap">
            <div class="coin-shadow" aria-hidden="true"></div>
            <div class="coin-visual" id="coinVisual" aria-hidden="true">
              <img
                class="coin-face-image coin-face-front"
                src="https://www.worldcoindatabase.com/img/coins/united-states-half-dollar-kennedy-obverse.png"
                alt="硬币正面"
              />
              <img
                class="coin-face-image coin-face-back"
                src="https://www.worldcoindatabase.com/img/coins/united-states-half-dollar-kennedy-reverse.png"
                alt="硬币背面"
              />
            </div>
          </div>
          <div class="result-label" id="coinResult">点击开始</div>
        </div>

        <button class="primary-btn" id="coinBtn" type="button">开始抛硬币</button>
      </section>

      <section class="card feature glass detail-view" id="diceView" hidden>
        <div class="feature-head">
          <h2>摇骰子</h2>
          <button class="ghost-btn" id="backFromDice" type="button">返回</button>
        </div>

        <div class="stage dice-stage">
          <div class="dice-wrap">
            <div class="dice-shadow" id="diceShadow" aria-hidden="true"></div>
            <div class="dice-display" id="diceDisplay" aria-hidden="true" data-value="1">
              <span class="pip pip-1"></span>
              <span class="pip pip-2"></span>
              <span class="pip pip-3"></span>
              <span class="pip pip-4"></span>
              <span class="pip pip-5"></span>
              <span class="pip pip-6"></span>
              <span class="pip pip-7"></span>
              <span class="pip pip-8"></span>
              <span class="pip pip-9"></span>
            </div>
          </div>
          <div class="result-label" id="diceResult">点击开始</div>
        </div>

        <button class="primary-btn" id="diceBtn" type="button">开始摇骰子</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
